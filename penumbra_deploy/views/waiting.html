<div style="position: relative; width: 100%; height: 100%; background: white; overflow: hidden;">
    <img id="gameBg" src="views/assets/NC.png" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; object-position: center;" alt="Фон" onerror="this.onerror=null; this.style.display='none'; document.getElementById('errorMsg').style.display='flex';">
    <div id="errorMsg" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; align-items: center; justify-content: center; flex-direction: column; color: red; font-family: monospace; text-align: center;">
        ❌ Ошибка: изображение views/assets/NC.png не найдено.<br>
        Проверьте, что файл загружен в папку views/assets/ и называется точно NC.png.
    </div>
    <div style="position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; z-index: 10;">
        <button class="waiting-btn" data-dir="left">◀ Влево</button>
        <button class="waiting-btn" data-dir="turn">🔄 Обернуться</button>
        <button class="waiting-btn" data-dir="right">Вправо ▶</button>
    </div>
</div>
<style>
    .waiting-btn {
        background: #2a2a2a;
        border: none;
        color: white;
        padding: 12px 24px;
        margin: 0 10px;
        font-family: monospace;
        font-size: 1.1rem;
        cursor: pointer;
        border-radius: 30px;
    }
    .waiting-btn:hover { background: #4a4a4a; }
</style>
<script>
    document.querySelectorAll('.waiting-btn').forEach(btn => {
        btn.addEventListener('click', () => alert('🚧 Функционал в разработке'));
    });
</script>
