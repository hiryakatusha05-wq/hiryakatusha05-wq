  <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Penumbra Solutions — вход</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(180deg, #000000 0%, #2a2a2a 100%);
            color: #dddddd;
            text-align: center;
            padding: 50px 20px;
            min-height: 100vh;
            font-family: 'Sitka Subheading', 'Georgia', serif;
        }
        h1 {
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 2.4rem;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-family: 'Gabriola', cursive;
            font-size: 1.6rem;
            color: #cccccc;
            margin-bottom: 2rem;
        }
        .glass-card {
            background: white;
            border: 1px solid #9e9e9e;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            margin: 20px auto;
            padding: 28px 20px;
            text-align: left;
        }
        .glass-card h3 {
            color: #2a2a2a;
            text-align: center;
            margin-bottom: 20px;
        }
        .glass-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #f9f9f9;
            border: 1px solid #bbb;
            border-radius: 8px;
            font-family: monospace;
        }
        .glass-card button {
            background: #6c6c6c;
            border: none;
            color: white;
            padding: 10px 18px;
            margin: 8px 8px 0 0;
            border-radius: 8px;
            cursor: pointer;
        }
        .error-message { color: #b33; font-size: 0.8rem; margin-top: 12px; text-align: center; }
    </style>
</head>
<body>
<h1>Penumbra Solutions</h1>
<div class="subtitle">Управляемая тишина для сложных миров.</div>
<div id="authContainer"></div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB4c624YTSRL68skj3SwRku5lsI_c4EyPU",
        authDomain: "penumbra-test.firebaseapp.com",
        projectId: "penumbra-test",
        storageBucket: "penumbra-test.firebasestorage.app",
        messagingSenderId: "229849130101",
        appId: "1:229849130101:web:e06ead8bfe40b4df43443c"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    const rulesTexts = [
        "Если увидели, как работник опрыскивает цветок — задержите дыхание на 7 секунд.",
        "Не смотрите в коридор, если оттуда доносится шёпот.",
        "Если Крис спросила «Какой сегодня день?» — назовите вчерашнюю дату.",
        "В лаунж-зоне «Эхо» запрещено аплодировать.",
        "Если Эри сказала «Подождите минуту» — ждите ровно 90 секунд.",
        "Не пейте в баре «Эхо» ничего, кроме того, что предложила Крис.",
        "Не трогайте кристаллы на стойке у Крис. Особенно третий слева."
    ];
    const rumorsTexts = [
        "Эри — бывший клиент, который так и не смог покинуть агентство.",
        "В архиве есть дело клиента, укравшего пыльцу теней.",
        "Крис умеет готовить коктейль, после которого клиент забывает свою внешность.",
        "У каждого сотрудника в архиве лежит запасное имя.",
        "В зале ожидания иногда меняется количество дверей."
    ];
    const rumorPrefixes = ["Слух:", "Говорят,", "Поговаривают,", "Шепчутся,", "Ходят слухи,"];
    function getRandomQuote() {
        const isRule = Math.random() < 0.5;
        if (isRule && rulesTexts.length) {
            return rulesTexts[Math.floor(Math.random() * rulesTexts.length)];
        } else {
            let rumor = rumorsTexts[Math.floor(Math.random() * rumorsTexts.length)];
            rumor = rumor.charAt(0).toLowerCase() + rumor.slice(1);
            const prefix = rumorPrefixes[Math.floor(Math.random() * rumorPrefixes.length)];
            return `${prefix} ${rumor}`;
        }
    }

    function showTemporaryMessage(text, duration = 2000) {
        const old = document.querySelector('.temp-message');
        if (old) old.remove();
        const div = document.createElement('div');
        div.className = 'temp-message';
        div.innerText = text;
        div.style.background = 'white';
        div.style.border = '1px solid #6c6c6c';
        div.style.borderRadius = '12px';
        div.style.padding = '12px 20px';
        div.style.maxWidth = '400px';
        div.style.margin = '20px auto';
        div.style.color = '#2a2a2a';
        document.getElementById('authContainer').prepend(div);
        setTimeout(() => div.remove(), duration);
    }

    let currentUser = null, emailVerifInterval = null;

    function clearContainer() { document.getElementById('authContainer').innerHTML = ''; if (emailVerifInterval) clearInterval(emailVerifInterval); }

    async function redirectToMain() { window.location.href = 'main.html'; }

    async function isNicknameUnique(nick) {
        const q = query(collection(db, "users"), where("nickname", "==", nick));
        const snap = await getDocs(q);
        return snap.empty;
    }

    async function showProfileForm() {
        clearContainer();
        let avatarBase64 = null, isSubmitting = false;
        const card = document.createElement('div');
        card.className = 'glass-card';
        card.innerHTML = `
            <h3>Тень принимает новую форму</h3>
            <p style="font-size:0.9rem; color:#444;">Укажите, как к вам обращаться.</p>
            <label>Имя пользователя *</label>
            <input type="text" id="nickname" placeholder="Псевдоним" maxlength="20">
            <div id="nicknameError" class="error-message"></div>
            <label>Дата рождения * (только 16+)</label>
            <input type="date" id="birthdate">
            <div id="birthError" class="error-message"></div>
            <label>Пол *</label>
            <select id="gender"><option value="male">Мужской</option><option value="female">Женский</option><option value="secret">Засекречено</option></select>
            <label>Код приглашения</label>
            <input type="text" id="inviteCode" placeholder="Если есть">
            <label>Аватарка</label>
            <div style="display:flex; align-items:center; gap:15px;">
                <div id="avatarPreview" style="width:60px;height:60px;border-radius:50%;background:#ddd;display:flex;align-items:center;justify-content:center;">🖤</div>
                <input type="file" id="avatarInput" accept="image/*">
            </div>
            <div style="margin-top:20px;">
                <button id="submitProfile">Отправить заявку</button>
                <button id="changeAccountBtn">Изменить аккаунт</button>
            </div>
            <div id="profileError" class="error-message"></div>
        `;
        document.getElementById('authContainer').appendChild(card);
        const nicknameInput = document.getElementById('nickname');
        const birthInput = document.getElementById('birthdate');
        const avatarInput = document.getElementById('avatarInput');
        const avatarPreview = document.getElementById('avatarPreview');
        const submitBtn = document.getElementById('submitProfile');
        const changeBtn = document.getElementById('changeAccountBtn');
        const profileError = document.getElementById('profileError');

        avatarInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && file.size <= 2*1024*1024) {
                const reader = new FileReader();
                reader.onload = (ev) => { avatarBase64 = ev.target.result; avatarPreview.innerHTML = `<img src="${avatarBase64}" style="width:100%;height:100%;border-radius:50%;">`; };
                reader.readAsDataURL(file);
            } else if (file) profileError.innerText = 'Файл >2 МБ';
        });

        submitBtn.addEventListener('click', async () => {
            if (isSubmitting) return;
            profileError.innerText = '';
            const nickname = nicknameInput.value.trim();
            const birthdate = birthInput.value;
            const gender = document.getElementById('gender').value;
            const inviteCode = document.getElementById('inviteCode').value.trim();
            if (!nickname || nickname.length<3 || nickname.length>20) { profileError.innerText = 'Никнейм 3-20 символов'; return; }
            if (!/^[a-zA-Zа-яА-Я0-9_.]+$/.test(nickname)) { profileError.innerText = 'Неверные символы'; return; }
            if (!birthdate) { profileError.innerText = 'Укажите дату'; return; }
            const birth = new Date(birthdate); let age = new Date().getFullYear() - birth.getFullYear();
            const m = new Date().getMonth() - birth.getMonth(); if (m<0 || (m===0 && new Date().getDate()<birth.getDate())) age--;
            if (age<16) { profileError.innerText = 'Только 16+'; return; }
            if (!await isNicknameUnique(nickname)) { profileError.innerText = 'Никнейм занят'; return; }
            isSubmitting = true; submitBtn.disabled = true;
            const userData = { uid: currentUser.uid, email: currentUser.email, nickname, birthdate, gender, inviteCode: inviteCode||null, avatar: avatarBase64||null, approved: false, submittedAt: new Date().toISOString(), balance: 100, trustLevel: 1, hasAcceptedRules: false };
            try {
                await setDoc(doc(db, "users", currentUser.uid), userData);
                // Показ загрузки с цитатами
                clearContainer();
                const loadingDiv = document.createElement('div'); loadingDiv.className = 'glass-card'; loadingDiv.style.maxWidth='450px';
                loadingDiv.innerHTML = `<h3>Ожидание одобрения</h3><div style="border:3px solid #aaa;border-top:3px solid #3a3a3a;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:15px auto;"></div><div id="quoteContainer"></div><div class="info-message" style="text-align:center;">Администратор проверяет данные</div>`;
                if (!document.querySelector('style#spin')) { const style = document.createElement('style'); style.id='spin'; style.textContent = '@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }'; document.head.appendChild(style); }
                document.getElementById('authContainer').appendChild(loadingDiv);
                const quoteContainer = document.getElementById('quoteContainer');
                let index=0;
                const updateQuote = () => { if(quoteContainer) quoteContainer.innerHTML = `<div style="font-family:monospace;color:#555;margin:8px 0;">${getRandomQuote()}</div>`; };
                updateQuote();
                const interval = setInterval(updateQuote, 5000);
                setTimeout(async () => {
                    clearInterval(interval);
                    await updateDoc(doc(db, "users", currentUser.uid), { approved: true });
                    redirectToMain();
                }, 30000);
            } catch(err) { profileError.innerText = 'Ошибка: '+err.message; submitBtn.disabled=false; isSubmitting=false; }
        });
        changeBtn.onclick = () => signOut(auth);
    }

    function showEmailVerificationScreen(user) {
        clearContainer();
        const card = document.createElement('div'); card.className = 'glass-card';
        card.innerHTML = `<h3>Подтверждение почты</h3><p>На адрес <strong>${user.email}</strong> отправлено письмо.</p><div><button id="resendBtn">Отправить ещё</button><button id="verifiedBtn">Я подтвердил</button><button id="changeEmailBtn">Изменить email</button></div><div id="verifyMsg" class="error-message"></div>`;
        document.getElementById('authContainer').appendChild(card);
        document.getElementById('resendBtn').onclick = async () => { await sendEmailVerification(user); document.getElementById('verifyMsg').innerText='Письмо отправлено'; };
        document.getElementById('verifiedBtn').onclick = async () => { await user.reload(); if(user.emailVerified) { if(emailVerifInterval) clearInterval(emailVerifInterval); const userDoc = await getDoc(doc(db,"users",user.uid)); if(!userDoc.exists()) showProfileForm(); else if(userDoc.data().approved===true) redirectToMain(); else { /* должна быть загрузка, но пропустим для краткости */ redirectToMain(); } } else { document.getElementById('verifyMsg').innerText='Ещё не подтверждён'; } };
        document.getElementById('changeEmailBtn').onclick = () => signOut(auth);
        emailVerifInterval = setInterval(async () => { await user.reload(); if(user.emailVerified) { clearInterval(emailVerifInterval); const userDoc = await getDoc(doc(db,"users",user.uid)); if(!userDoc.exists()) showProfileForm(); else if(userDoc.data().approved===true) redirectToMain(); else redirectToMain(); } }, 3000);
    }

    function showLoginForm() {
        clearContainer();
        const card = document.createElement('div'); card.className = 'glass-card';
        card.innerHTML = `<h3>Авторизация</h3><input type="email" id="loginEmail" placeholder="Электронная почта"><input type="password" id="loginPassword" placeholder="Пароль"><div><button id="loginBtn">Войти</button><button id="registerBtn">Регистрация</button><button id="googleLoginBtn">Войти через Google</button></div><div id="loginError" class="error-message"></div>`;
        document.getElementById('authContainer').appendChild(card);
        const emailInp = document.getElementById('loginEmail'), pwdInp = document.getElementById('loginPassword'), errorDiv = document.getElementById('loginError');
        document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, emailInp.value, pwdInp.value).catch(err => errorDiv.innerText = err.message);
        document.getElementById('registerBtn').onclick = () => createUserWithEmailAndPassword(auth, emailInp.value, pwdInp.value).then(uc => sendEmailVerification(uc.user)).catch(err => errorDiv.innerText = err.message);
        document.getElementById('googleLoginBtn').onclick = () => signInWithPopup(auth, googleProvider).catch(err => errorDiv.innerText = err.message);
    }

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            currentUser = user;
            if(!user.emailVerified && !user.providerData.some(p=>p.providerId==='google.com')) showEmailVerificationScreen(user);
            else {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if(!userDoc.exists()) showProfileForm();
                else if(userDoc.data().approved === true) redirectToMain();
                else {
                    // ожидание одобрения (упрощённо)
                    showTemporaryMessage('Ваша заявка уже обрабатывается', 2000);
                    setTimeout(() => redirectToMain(), 2000);
                }
            }
        } else {
            showLoginForm();
        }
    });
</script>
</body>
</html>
